version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-auth:latest
    container_name: api_auth_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - API_VERSION=v1
      - DATABASE_URL=postgresql://postgres:postgres@postgres_db:5432/api_auth?schema=public
      - REDIS_URL=redis://redis_cache:6379
      - JWT_ACCESS_SECRET=e7bca2e4fd669d2d0c2e9154a1a5b84931a74ad94cfd58b29ff6de578f244198
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_SECRET=7f884fbf9205562723c343b4f6cfbe2ebae148d5b1285223ab40d2bbcbcf8b84
      - JWT_REFRESH_EXPIRY=7d
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=smtp_username_placeholder
      - SMTP_PASS=smtp_password_placeholder
      - SMTP_FROM="SaaS Platform Auth" <noreply@saasplatform.com>
      - CORS_ORIGIN=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - COOKIES_SECURE=true
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    networks:
      - app_network

  postgres_db:
    image: postgres:15-alpine
    container_name: api_auth_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis_cache:
    image: redis:7-alpine
    container_name: api_auth_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:

networks:
  app_network:
    driver: bridge
